name: Close linked issues

# When a PR is merged, close every issue it references with a closing keyword
# (close/closes/closed, fix/fixes/fixed, resolve/resolves/resolved).
#
# GitHub already does this automatically — but ONLY when the PR merges into the
# repository's default branch. This workflow extends the behavior to PRs merged
# into any base branch (e.g. feature/integration branches) so the issue tracker
# stays in sync regardless of merge target.

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  contents: read

jobs:
  close-issues:
    # only act on PRs that were actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close issues referenced by closing keywords
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const text = `${pr.title}\n\n${pr.body || ''}`;

            // match: <keyword> #123  (keyword is case-insensitive)
            const re = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\b[:\s]+#(\d+)/gi;
            const numbers = new Set();
            for (const m of text.matchAll(re)) numbers.add(Number(m[1]));

            if (numbers.size === 0) {
              core.info('No closing-keyword issue references found in this PR.');
              return;
            }

            for (const issue_number of numbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  ...context.repo, issue_number,
                });
                if (issue.state === 'closed') {
                  core.info(`#${issue_number} already closed — skipping.`);
                  continue;
                }
                await github.rest.issues.createComment({
                  ...context.repo, issue_number,
                  body: `Closed by #${pr.number} (merged into \`${pr.base.ref}\`).`,
                });
                await github.rest.issues.update({
                  ...context.repo, issue_number, state: 'closed',
                });
                core.info(`Closed #${issue_number}.`);
              } catch (err) {
                core.warning(`Could not close #${issue_number}: ${err.message}`);
              }
            }
