name: CI
on: [workflow_dispatch, pull_request, push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak
          # torchcodec (torchaudio 2.9 audio I/O) needs an FFmpeg whose libavutil
          # soname it was built against (56/57/59/60). Ubuntu's apt ffmpeg is v6
          # (libavutil.58, unsupported), so install conda-forge ffmpeg 7
          # (libavutil.59) and expose it to later steps via LD_LIBRARY_PATH.
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xj bin/micromamba
          ./bin/micromamba create -y -p "$HOME/ffenv" -c conda-forge 'ffmpeg=7'
          echo "LD_LIBRARY_PATH=$HOME/ffenv/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          python -m pip install --upgrade pip
          # nbdev toolchain (pinned) + torch stack + deps all come from .[dev];
          # CPU torch index keeps the runner from pulling CUDA wheels.
          pip install -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Diagnostic Information
        run: |
          python -c "import torch; print('Torch version:', torch.__version__)"
          python -c "import torchvision; print('Torchvision version:', torchvision.__version__)"
          python -c "import os; print('Current working directory:', os.getcwd())"
          python -c "import sys; print('Python path:', sys.path)"

      - name: Clean notebooks
        run: |
          nbdev_clean

      - name: Export notebooks
        run: |
          nbdev_export

      - name: Run tests
        run: |
          # Skip notebooks that can't run in CI:
          #   image.med         - vendored BLIP uses transformers internals removed upstream
          #   audio.datasets.stt - needs a LibriSpeech manifest that isn't in the repo
          # (default ^[_.] preserved so _*/.* notebooks stay skipped.)
          nbdev_test --do_print --timing --skip_file_re '^[_.]|image\.med|audio\.datasets\.stt'