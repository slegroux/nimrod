# macOS (Apple Silicon) base environment for nimrod.
#
#   micromamba env create -f .devcontainer/environment-macos.yml   # creates env "nimrod"
#   micromamba activate nimrod
#   pip install -e .                                                # pulls the rest from settings.ini
#
# Torch is pinned to the 2.9.1 release matrix: Blackwell-capable (DGX Spark/GB10
# needs cu130 wheels on Linux), works on H100 and Apple MPS. torchtext was
# dropped (archived + unused), which lifted the old torch 2.3 / numpy<2 pins.
# See INSTALL.md for the full rationale and the optional LM / speech extras.
name: nimrod
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # native libs the audio / speech stack (torchaudio, lhotse, librosa) links at runtime
  - ffmpeg
  - libsndfile
  - pip:
    # torch family — keep these three in lock-step (the 2.9.1 release matrix).
    # On Linux GPU (H100 / DGX Spark) install from the cu130 index instead:
    #   pip install torch==2.9.1 torchvision==0.24.1 torchaudio==2.9.1 \
    #       --index-url https://download.pytorch.org/whl/cu130
    - torch==2.9.1
    - torchvision==0.24.1
    - torchaudio==2.9.1
    # everything else (lightning, hydra, datasets, lhotse, encodec, phonemizer,
    # jupyterlab, nbdev, ...) is resolved from settings.ini via `pip install -e .`
