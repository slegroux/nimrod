; cd build
; cmake ..
; make -j 4
; pip install https://github.com/kpu/kenlm/archive/master.zip #cupy 

# nbdev toolchain pinned to a mutually-compatible 2.x set: nbdev 3.x renamed the
# console scripts (nbdev-clean) and dropped settings.ini; latest execnb dropped
# execnb.nbio and latest fastcore dropped fastcore.dispatch, both breaking nbdev 2.x.
# setuptools<81 keeps pkg_resources, which nbdev 2.3.x still imports.
# Installed via .[dev] in CI and the quarto-ghp docs action.
dev_requirements = nbdev==2.3.13 fastcore==1.5.29 execnb==0.1.5 setuptools<81
