; torch 2.9.x matrix: Blackwell-capable (DGX Spark/GB10 via cu130), Hopper (H100), and Apple MPS.
; torchtext removed (archived, unused by the code) — that lifted the torch 2.3 / numpy<2 pins.
; transformers kept <5: nimrod/image/med.py vendors BLIP and uses transformers internals 5.x removed.
requirements = torch==2.9.1 torchvision==0.24.1 torchaudio==2.9.1 jupyterlab numpy lightning \
    accelerate anyascii datasets diffusers encodec fairscale fastprogress ftfy hydra_colorlog hydra-core hydra-optuna-sweeper \
    inflect ipykernel librosa livelossplot lhotse \
    matplotlib omegaconf pandas phonemizer plum-dispatch \
    pre-commit python-dotenv pytest timm tensorboard torch-lr-finder torchinfo torchviz tqdm transformers<5 wandb

